blank_issues_enabled: false
contact_links:
  - name: 使用求助 / Question
    url: https://github.com/wjptz/suncode/discussions/categories/q-a
    about: 使用问题、配置疑问、"支持 X 吗" —— 请发到 Q&A 讨论区，保持 Issues 只装确认的 bug / feature。
  - name: 想法 / 大改动提案 (Idea / Proposal)
    url: https://github.com/wjptz/suncode/discussions/categories/ideas
    about: 较大或破坏性的改动（架构调整、工作流重构等）请先在 Ideas 讨论区聊方向，达成共识后再开 Issue / PR。
  - name: 文档问题 / Documentation
    url: https://github.com/wjptz/suncode-docs/issues/new
    about: 文档相关问题请在 docs 仓提交。
